<!doctype html>
<html lang="de">
  <head>
    <meta charset="utf-8" />
    <title>LokLM Installer</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #07111f;
        --fg: #f6f4ef;
        --muted: #9fb0c1;
        --accent: #3b82f6;
        --accent-2: #7dd3fc;
        --border: rgba(148, 163, 184, 0.24);
      }
      * {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        width: 720px;
        height: 400px;
        overflow: hidden;
        color: var(--fg);
        font-family:
          Inter,
          'Segoe UI',
          ui-sans-serif,
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          sans-serif;
        background:
          radial-gradient(circle at 22% 18%, rgba(59, 130, 246, 0.32), transparent 38%),
          radial-gradient(circle at 80% 92%, rgba(20, 184, 166, 0.22), transparent 36%),
          linear-gradient(135deg, #07111f 0%, #0b1b2b 52%, #101827 100%);
        /* Smooths text on the headless chromium pass — playwright's default
         * rendering is already retina-grade , this just nudges the hint
         * text away from the very subtle aliasing that can show up on the
         * resampled BMP. */
        -webkit-font-smoothing: antialiased;
        text-rendering: optimizeLegibility;
      }
      .splash {
        position: relative;
        height: 100%;
        display: grid;
        grid-template-columns: 200px 1fr;
        align-items: center;
        gap: 52px;
        padding: 52px 60px;
      }
      .logo {
        width: 200px;
        height: 200px;
        display: grid;
        place-items: center;
        border-radius: 44px;
        background: rgba(2, 8, 23, 0.42);
        border: 1px solid rgba(246, 244, 239, 0.18);
        position: relative;
      }
      .logo::after {
        content: '';
        position: absolute;
        inset: -6px;
        border-radius: 50px;
        border: 1px solid rgba(125, 211, 252, 0.32);
        opacity: 0.55;
        animation: glow 2.4s ease-in-out infinite;
      }
      .copy {
        display: flex;
        flex-direction: column;
        gap: 14px;
        min-width: 0;
      }
      .eyebrow {
        margin: 0;
        color: var(--accent-2);
        font-size: 0.95rem;
        font-weight: 700;
        letter-spacing: 0.18em;
        text-transform: uppercase;
      }
      .brand {
        margin: 0;
        font-size: 3.6rem;
        font-weight: 800;
        letter-spacing: 0;
        line-height: 1;
      }
      .hint {
        margin: 14px 0 0;
        color: var(--muted);
        font-size: 1.1rem;
        letter-spacing: 0.04em;
        display: inline-flex;
        align-items: center;
        gap: 16px;
      }
      .dots {
        display: inline-flex;
        gap: 10px;
      }
      .dots span {
        width: 12px;
        height: 12px;
        border-radius: 50%;
        background: var(--accent);
        opacity: 0.28;
        animation: pulse 1.2s infinite ease-in-out;
      }
      .dots span:nth-child(2) {
        animation-delay: 0.18s;
      }
      .dots span:nth-child(3) {
        animation-delay: 0.36s;
      }
      @keyframes pulse {
        0%,
        80%,
        100% {
          opacity: 0.28;
          transform: scale(0.78);
        }
        40% {
          opacity: 1;
          transform: scale(1.1);
        }
      }
      @keyframes glow {
        0%,
        100% {
          opacity: 0.32;
          transform: scale(1);
        }
        50% {
          opacity: 0.85;
          transform: scale(1.03);
        }
      }
    </style>
  </head>
  <body>
    <div class="splash">
      <div class="logo" aria-hidden="true">
        <svg viewBox="0 0 64 64" width="124" height="124" fill="none">
          <rect
            x="14"
            y="22"
            width="36"
            height="30"
            rx="2"
            stroke="#F6F4EF"
            stroke-width="3"
            opacity="0.35"
          />
          <rect
            x="11"
            y="17"
            width="36"
            height="30"
            rx="2"
            stroke="#F6F4EF"
            stroke-width="3"
            opacity="0.65"
          />
          <rect
            x="8"
            y="12"
            width="36"
            height="30"
            rx="2"
            fill="#0B1B2B"
            stroke="#F6F4EF"
            stroke-width="3"
          />
          <circle cx="38" cy="20" r="2.6" fill="#7DD3FC" />
          <path
            d="M14 22 H32 M14 28 H30 M14 34 H26"
            stroke="#F6F4EF"
            stroke-width="1.8"
            stroke-linecap="round"
            opacity="0.6"
          />
        </svg>
      </div>
      <div class="copy">
        <p class="eyebrow">Lokaler KI-Wissensassistent</p>
        <h1 class="brand">LokLM</h1>
        <p class="hint">
          <span>wird geladen</span>
          <span class="dots" aria-hidden="true"> <span></span><span></span><span></span> </span>
        </p>
      </div>
    </div>
  </body>
</html>
