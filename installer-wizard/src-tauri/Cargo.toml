[package]
name = "loklm-installer"
version = "0.2.6"
edition = "2021"
description = "LokLM Installer ( Tauri-based wizard )"
authors = ["Projektgruppe LokLM ( Denys Tudosa , Dominik Furlan )"]
license = "MIT"

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
tauri = { version = "2", features = [] }
# Native directory picker on Windows ( IFileDialog COM via dialog plugin )
tauri-plugin-dialog = "2"
# Used for spawn_blocking around the install ( robocopy / powershell can
# block multiple seconds ) so the UI thread stays responsive.
tokio = { version = "1", features = ["rt", "sync"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"

[profile.release]
opt-level = "z"
lto = true
codegen-units = 1
strip = true
panic = "abort"
