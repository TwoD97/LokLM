name: Build translator sidecar

# Builds the loklm-translator MT sidecar (CTranslate2 + SentencePiece) once per
# platform and uploads the prebuilt binaries to minio , so the release workflow
# can FETCH them rather than compile CTranslate2 from source on every release
# (a 10-25 min cold CPU build , 30+ min with CUDA — far too heavy per release).
#
# Run this manually after changing sidecars/translator/** (or bumping the CT2 /
# SentencePiece tags in its CMakeLists). The release workflow's
# "Fetch prebuilt translator sidecar" step pulls whatever this last published.
#
# Layout on minio ( authenticated build-time fetch , NOT the end-user download ):
#   loklm-installers/translator-sidecar/<plat>/cpu/   loklm-translator(.exe)
#   loklm-installers/translator-sidecar/<plat>/cuda/  loklm-translator-cuda(.exe) + CUDA libs
# CUDA is NVIDIA-only , so mac has a cpu/ tree only.
#
# NOTE ( Denys / release-owner ) : this can't be exercised from a dev box —
# verify the CUDA-toolkit action version + the minio paths on first run. The
# CUDA build needs nvcc but NOT a GPU ( it bakes compute_89 PTX that the user's
# card JITs at runtime ) , so a GPU-less runner is fine.

on:
  workflow_dispatch:
    inputs:
      cuda_version:
        description: 'CUDA toolkit version for the GPU build (win/linux)'
        required: false
        default: '12.6.0'
        type: string
  push:
    branches: [main]
    paths:
      - 'sidecars/translator/**'
      - 'scripts/build-translator-sidecar.ps1'
      - '.github/workflows/build-translator-sidecar.yml'

concurrency:
  group: build-translator-sidecar
  cancel-in-progress: false

jobs:
  # ---------------------------------------------------------------- Windows ---
  windows:
    # Pinned to windows-2022 ( VS 2022 ) , not windows-latest: the latter is
    # mid-migration to Windows Server 2025 + VS 2026 ( 2026-06 ) , which breaks
    # vcvars/VS discovery for the CUDA build. 2022 matches the working CPU build.
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 24 }

      - name: Install CUDA toolkit
        uses: Jimver/cuda-toolkit@v0.2.35
        id: cuda
        with:
          cuda: ${{ github.event.inputs.cuda_version || '12.6.0' }}
          # nvcc + libraries are enough ; no driver/GPU needed to compile. These
          # network-installer component names are verified working since 0.4.0 ,
          # so they're left unchanged. cuBLASLt 12.x needs nvJitLink64.dll , but
          # the Windows cublas component bundles it into CUDA's bin/ — the build
          # script stages it with an optional nvJitLink64_*.dll glob ( no extra
          # sub-package , which avoids risking this known-good install list ).
          method: 'network'
          sub-packages: '["nvcc", "cudart", "cublas", "nvrtc"]'

      # CPU is the baseline that must ship on every machine , so it builds + uploads
      # FIRST and unconditionally. CUDA ( GPU acceleration ) is a bonus built
      # best-effort afterwards — a CUDA failure must never strand the CPU sidecar.
      - name: Build CPU sidecar
        shell: pwsh
        run: pwsh scripts/build-translator-sidecar.ps1

      - name: Upload CPU sidecar to minio
        shell: bash
        env:
          MINIO_ENDPOINT: ${{ secrets.MINIO_ENDPOINT }}
          MINIO_ACCESS_KEY: ${{ secrets.MINIO_ACCESS_KEY }}
          MINIO_SECRET_KEY: ${{ secrets.MINIO_SECRET_KEY }}
        run: |
          curl -fsSL -o /tmp/mc.exe https://dl.min.io/client/mc/release/windows-amd64/mc.exe
          /tmp/mc.exe alias set s3 "https://${MINIO_ENDPOINT}" "$MINIO_ACCESS_KEY" "$MINIO_SECRET_KEY"
          BASE="s3/loklm-installers/translator-sidecar/win-x64"
          # Windows mc.exe mishandles directory transfers: `cp --recursive src/ dst/`
          # NESTS the dir ( cpu/dist/loklm-translator.exe ) and `mirror` errors on
          # the local list comparison ( "Object name contains unsupported
          # characters" , uploads 0 B ). The CPU dir is a single binary , so copy
          # it to an EXACT object key — the one primitive that's reliable here.
          /tmp/mc.exe cp sidecars/translator/dist/loklm-translator.exe "$BASE/cpu/loklm-translator.exe"
          /tmp/mc.exe ls --recursive "$BASE/cpu/"

      # --- Windows GPU build prep: Ninja + the MSVC dev env ----------------------
      # CMake's default VS generator aborts at project(CXX CUDA) because the network
      # CUDA install doesn't drop the VS MSBuild integration (.props). The Ninja
      # generator sidesteps that: it finds the toolkit on PATH and lets nvcc drive
      # cl.exe directly. Ninja isn't on the runner PATH , and ( unlike the VS
      # generator ) Ninja does NOT auto-load vcvars — so set up both here , AFTER the
      # CPU build/upload ( which keeps using the working VS generator , untouched ).
      - name: Set up MSVC dev environment ( nvcc host compiler )
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64
      - name: Install Ninja
        shell: pwsh
        run: choco install ninja -y --no-progress

      - name: Build CUDA sidecar ( best-effort )
        # Uses the Ninja generator ( forced in build-translator-sidecar.ps1 on
        # Windows ) so nvcc finds cl.exe via the vcvars loaded above , no VS CUDA
        # integration needed. Still best-effort so a CUDA hiccup never fails the
        # job / blocks the CPU sidecar.
        id: cudabuild
        continue-on-error: true
        shell: pwsh
        run: pwsh scripts/build-translator-sidecar.ps1 -Cuda

      - name: Upload CUDA sidecar to minio ( if it built )
        if: steps.cudabuild.outcome == 'success'
        continue-on-error: true
        shell: bash
        env:
          MINIO_ENDPOINT: ${{ secrets.MINIO_ENDPOINT }}
          MINIO_ACCESS_KEY: ${{ secrets.MINIO_ACCESS_KEY }}
          MINIO_SECRET_KEY: ${{ secrets.MINIO_SECRET_KEY }}
        run: |
          curl -fsSL -o /tmp/mc.exe https://dl.min.io/client/mc/release/windows-amd64/mc.exe
          /tmp/mc.exe alias set s3 "https://${MINIO_ENDPOINT}" "$MINIO_ACCESS_KEY" "$MINIO_SECRET_KEY"
          BASE="s3/loklm-installers/translator-sidecar/win-x64"
          # Per-file explicit cp ( same Windows mc.exe caveat as the CPU upload ).
          # dist-cuda/ holds the -cuda exe + redistributable DLLs.
          for f in sidecars/translator/dist-cuda/*; do
            /tmp/mc.exe cp "$f" "$BASE/cuda/$(basename "$f")"
          done
          /tmp/mc.exe ls --recursive "$BASE/cuda/"

  # ------------------------------------------------------------------ Linux ---
  linux:
    # Match the release runner so the glibc floor of the shipped binary is the
    # same ( ubuntu-22.04 = glibc 2.35 ).
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 24 }

      - name: Install build deps (cmake, pwsh)
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake build-essential
          # PowerShell for the build script.
          sudo apt-get install -y wget apt-transport-https software-properties-common
          wget -q https://packages.microsoft.com/config/ubuntu/22.04/packages-microsoft-prod.deb
          sudo dpkg -i packages-microsoft-prod.deb && rm packages-microsoft-prod.deb
          sudo apt-get update && sudo apt-get install -y powershell

      - name: Install CUDA toolkit
        uses: Jimver/cuda-toolkit@v0.2.35
        with:
          cuda: ${{ github.event.inputs.cuda_version || '12.6.0' }}
          method: 'network'
          # Linux network method = apt. sub-packages map to cuda-<name>-<maj>-<min>
          # and non-cuda-sub-packages to <name>-<maj>-<min>. cuBLAS ships as
          # libcublas* ( NOT cuda-cublas* ) and nvJitLink as libnvjitlink* , so
          # BOTH must go via non-cuda-sub-packages or apt can't find them. The
          # -dev variants bring the headers + unversioned .so symlink CT2 needs to
          # COMPILE/link; cccl brings the thrust/cub headers CT2's CUDA kernels
          # include; libcublas-dev pulls libcublasLt; libcurand-dev brings
          # curand_kernel.h ( CT2's GPU sampling kernels #include it ); libnvjitlink
          # is cuBLASLt's runtime dep. ( v0.2.19's old "cublas" sub-package ->
          # cuda-cublas-12-6 , which does not exist , would have failed the install. )
          sub-packages: '["nvcc", "cudart-dev", "nvrtc", "cccl"]'
          non-cuda-sub-packages: '["libcublas-dev", "libcurand-dev", "libnvjitlink"]'

      # CPU is the baseline that must ship on every machine , so it builds + uploads
      # FIRST and unconditionally. CUDA ( GPU acceleration ) is a bonus built
      # best-effort afterwards — a CUDA failure must never strand the CPU sidecar.
      - name: Build CPU sidecar
        run: pwsh scripts/build-translator-sidecar.ps1

      - name: Upload CPU sidecar to minio
        env:
          MINIO_ENDPOINT: ${{ secrets.MINIO_ENDPOINT }}
          MINIO_ACCESS_KEY: ${{ secrets.MINIO_ACCESS_KEY }}
          MINIO_SECRET_KEY: ${{ secrets.MINIO_SECRET_KEY }}
        run: |
          curl -fsSL -o /tmp/mc https://dl.min.io/client/mc/release/linux-amd64/mc && chmod +x /tmp/mc
          /tmp/mc alias set s3 "https://${MINIO_ENDPOINT}" "$MINIO_ACCESS_KEY" "$MINIO_SECRET_KEY"
          BASE="s3/loklm-installers/translator-sidecar/linux-x64"
          /tmp/mc cp --recursive sidecars/translator/dist/ "$BASE/cpu/"
          /tmp/mc ls --recursive "$BASE/cpu/"

      - name: Build CUDA sidecar ( best-effort )
        id: cudabuild
        continue-on-error: true
        run: pwsh scripts/build-translator-sidecar.ps1 -Cuda

      - name: Verify CUDA sidecar resolves all libs from $ORIGIN ( clean-box sim )
        # The release box has no CUDA toolkit and the end-user box has only the
        # NVIDIA driver — so the staged dist-cuda/ binary must resolve EVERY
        # non-driver lib from its co-located $ORIGIN set. Any CUDA redist lib that
        # ldd can't find here ( e.g. libnvJitLink.so.12 ) , or that resolves to a
        # toolkit path instead of this dir , would crash the sidecar on a user
        # box. libcuda.so ( the driver ) is legitimately absent on this GPU-less
        # runner and ships with the user's driver , so it's excluded.
        id: cudaverify
        if: steps.cudabuild.outcome == 'success'
        continue-on-error: true
        shell: bash
        run: |
          set -euo pipefail
          cd sidecars/translator/dist-cuda
          HERE="$(pwd)"
          echo "staged files:"; ls -la
          env -u LD_LIBRARY_PATH ldd ./loklm-translator-cuda | tee /tmp/ldd.txt || true
          BAD=$(awk -v here="$HERE" '
            /not found/ { if ($1 !~ /^libcuda\.so/) print; next }
            /=>/ {
              name=$1; path=$3;
              if (name ~ /^libcuda\.so/) next;
              if (name ~ /^(libcudart|libcublas|libcublasLt|libnvrtc|libnvrtc-builtins|libnvJitLink|libcurand|libcusparse|libcusolver)/) {
                if (path !~ ("^" here)) print;
              }
            }' /tmp/ldd.txt || true)
          if [ -n "$BAD" ]; then
            echo "::error::CUDA sidecar has redist libs not co-located in dist-cuda/ (would crash on a clean NVIDIA box):"
            echo "$BAD"
            exit 1
          fi
          echo "all CUDA redist libs resolve from \$ORIGIN — OK"

      - name: Upload CUDA sidecar to minio ( if built + verified )
        if: steps.cudabuild.outcome == 'success' && steps.cudaverify.outcome == 'success'
        continue-on-error: true
        env:
          MINIO_ENDPOINT: ${{ secrets.MINIO_ENDPOINT }}
          MINIO_ACCESS_KEY: ${{ secrets.MINIO_ACCESS_KEY }}
          MINIO_SECRET_KEY: ${{ secrets.MINIO_SECRET_KEY }}
        run: |
          curl -fsSL -o /tmp/mc https://dl.min.io/client/mc/release/linux-amd64/mc && chmod +x /tmp/mc
          /tmp/mc alias set s3 "https://${MINIO_ENDPOINT}" "$MINIO_ACCESS_KEY" "$MINIO_SECRET_KEY"
          BASE="s3/loklm-installers/translator-sidecar/linux-x64"
          /tmp/mc cp --recursive sidecars/translator/dist-cuda/ "$BASE/cuda/"
          /tmp/mc ls --recursive "$BASE/cuda/"

  # ----------------------------------------------------------- macOS (arm64) ---
  # Apple Silicon (M1/M2/M3/M4). CT2 has no Metal backend , so mac is CPU-only on
  # every chip — there is no cuda/ tree , just cpu/.
  macos-arm64:
    runs-on: macos-latest # macos-latest is Apple-Silicon (arm64).
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 24 }

      - name: Install build deps (cmake, pwsh)
        run: |
          # macOS runners ship cmake + pwsh pre-installed; only install if
          # missing. ( `brew install powershell` over the pre-installed copy
          # fails at the `brew link` step — dotnet/powershell already linked. )
          command -v cmake >/dev/null || brew install cmake
          command -v pwsh  >/dev/null || brew install powershell
          cmake --version
          pwsh --version

      - name: Build CPU sidecar (no CUDA on macOS)
        run: pwsh scripts/build-translator-sidecar.ps1

      - name: Upload to minio (mac-arm64/cpu)
        env:
          MINIO_ENDPOINT: ${{ secrets.MINIO_ENDPOINT }}
          MINIO_ACCESS_KEY: ${{ secrets.MINIO_ACCESS_KEY }}
          MINIO_SECRET_KEY: ${{ secrets.MINIO_SECRET_KEY }}
        run: |
          curl -fsSL -o /tmp/mc https://dl.min.io/client/mc/release/darwin-arm64/mc && chmod +x /tmp/mc
          /tmp/mc alias set s3 "https://${MINIO_ENDPOINT}" "$MINIO_ACCESS_KEY" "$MINIO_SECRET_KEY"
          BASE="s3/loklm-installers/translator-sidecar/mac-arm64"
          /tmp/mc cp --recursive sidecars/translator/dist/ "$BASE/cpu/"
          /tmp/mc ls --recursive "$BASE/"

  # ------------------------------------------------------------- macOS (x64) ---
  # Intel Macs. The old Intel image (macos-13) was retired 2025-12-04 ;
  # macos-15-intel is the current — and last — x86_64 runner (GA until ~2027).
  # Without this job an x64 mac would get NO translator at all : the arm64 binary
  # can't run on Intel , so translation would simply be absent there.
  macos-x64:
    runs-on: macos-15-intel
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 24 }

      - name: Install build deps (cmake, pwsh)
        run: |
          # macOS runners ship cmake + pwsh pre-installed; only install if
          # missing. ( `brew install powershell` over the pre-installed copy
          # fails at the `brew link` step — dotnet/powershell already linked. )
          command -v cmake >/dev/null || brew install cmake
          command -v pwsh  >/dev/null || brew install powershell
          cmake --version
          pwsh --version

      - name: Build CPU sidecar (no CUDA on macOS)
        run: pwsh scripts/build-translator-sidecar.ps1

      - name: Upload to minio (mac-x64/cpu)
        env:
          MINIO_ENDPOINT: ${{ secrets.MINIO_ENDPOINT }}
          MINIO_ACCESS_KEY: ${{ secrets.MINIO_ACCESS_KEY }}
          MINIO_SECRET_KEY: ${{ secrets.MINIO_SECRET_KEY }}
        run: |
          curl -fsSL -o /tmp/mc https://dl.min.io/client/mc/release/darwin-amd64/mc && chmod +x /tmp/mc
          /tmp/mc alias set s3 "https://${MINIO_ENDPOINT}" "$MINIO_ACCESS_KEY" "$MINIO_SECRET_KEY"
          BASE="s3/loklm-installers/translator-sidecar/mac-x64"
          /tmp/mc cp --recursive sidecars/translator/dist/ "$BASE/cpu/"
          /tmp/mc ls --recursive "$BASE/"
