name: Release installer

# baut den electron-installer für eine version , lädt ihn nach bunny storage
# (primary, fronted vom CDN) und minio (manual backup mirror) , patcht
# releases.ts + re-deployt die website mit aktualisiertem manifest.
# v0.2.2+ : windows ist nsis statt zip , GGUFs werden NICHT mehr gebundled
# (first-launch downloader holt sie in userData/models). slim installer
# ~375 MB statt ~6 GB.
# backup-URL-pattern bei CDN-ausfall:
#   https://s3.ltwodl.com/loklm-installers/v<V>/LokLM-Setup-<V>-win-x64.exe
#   https://s3.ltwodl.com/loklm-installers/v<V>/LokLM-<V>.AppImage
on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      version:
        description: 'Version ohne v-prefix , z.b. 0.1.0'
        required: true
        type: string

# nur eine release-pipeline pro version gleichzeitig.
concurrency:
  group: release-installer-${{ github.event.inputs.version || github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  build-windows:
    name: Build .exe + upload to bunny + minio
    runs-on: windows-latest
    outputs:
      version: ${{ steps.resolve.outputs.version }}
      sha256: ${{ steps.hash.outputs.sha256 }}
      size: ${{ steps.hash.outputs.size }}
    steps:
      - uses: actions/checkout@v4

      - name: Resolve version (tag oder dispatch-input)
        id: resolve
        shell: bash
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            V="${{ github.event.inputs.version }}"
          else
            V="${GITHUB_REF#refs/tags/v}"
          fi
          if [ -z "$V" ]; then
            echo "could not resolve version"; exit 1
          fi
          echo "version=$V" >> "$GITHUB_OUTPUT"
          PKG_V=$(node -p "require('./package.json').version")
          if [ "$V" != "$PKG_V" ]; then
            echo "::warning::workflow version $V != package.json $PKG_V , artefakt wird $V haben"
          fi

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install deps
        run: pnpm install --frozen-lockfile

      - name: Install Playwright chromium ( splash render )
        # build:installer-splash rendert installer-ui/splash.html in headless
        # chromium und schreibt resources/installer-splash.bmp ( gitignored ).
        # @playwright/test ist NICHT in pnpm.onlyBuiltDependencies , also lädt
        # pnpm install den browser nicht automatisch — hier explizit holen.
        run: pnpm exec playwright install --with-deps chromium

      - name: Build (electron-vite)
        run: pnpm build

      # v0.2.2+ : keine GGUFs mehr im installer. Der first-launch downloader
      # (src/main/services/models/ModelDownloader.ts) holt embedder + reranker
      # + LLM nach %APPDATA%\loklm\models\ via SHA256-verifizierten HTTP-pulls
      # gegen die URLs in src/main/services/models/manifest.ts. CI braucht die
      # GGUFs daher nicht mehr , spart ~6 GB download pro run.

      - name: Package (portable 7zSD self-extractor)
        # electron-builder's "portable" target wrapt payload + wizard in einer
        # single-file .exe via 7zSD ; splashImage zeigt resources/installer-
        # splash.bmp während der self-extract phase. npmRebuild=false in
        # package.json umgeht @electron/rebuild (alle native deps sind N-API
        # prebuilt). Kein makensis mehr nötig — der frühere NSIS-stub-ansatz
        # wurde durch das build-in portable target ersetzt.
        run: pnpm package:win

      - name: Compute sha256 + size
        id: hash
        shell: bash
        run: |
          V="${{ steps.resolve.outputs.version }}"
          EXE="release/installer/LokLM-Setup-${V}-win-x64.exe"
          if [ ! -f "$EXE" ]; then
            echo "expected artefact missing: $EXE"; ls -la release/; exit 1
          fi
          SHA=$(sha256sum "$EXE" | awk '{print $1}')
          SIZE=$(stat -c%s "$EXE")
          echo "$SHA  $(basename "$EXE")" > "${EXE}.sha256"
          echo "sha256=$SHA" >> "$GITHUB_OUTPUT"
          echo "size=$SIZE" >> "$GITHUB_OUTPUT"
          echo "built $EXE , size=$SIZE sha256=$SHA"

      - name: Upload to Bunny Storage (primary , served via CDN)
        shell: bash
        env:
          BUNNY_STORAGE_ZONE: ${{ secrets.BUNNY_STORAGE_ZONE }}
          BUNNY_STORAGE_HOSTNAME: ${{ secrets.BUNNY_STORAGE_HOSTNAME }}
          BUNNY_STORAGE_PASSWORD: ${{ secrets.BUNNY_STORAGE_PASSWORD }}
        run: |
          V="${{ steps.resolve.outputs.version }}"
          FILE="release/installer/LokLM-Setup-${V}-win-x64.exe"
          BASE="https://${BUNNY_STORAGE_HOSTNAME}/${BUNNY_STORAGE_ZONE}/v${V}"
          curl -fsSL --retry 3 --retry-delay 5 -X PUT \
            -H "AccessKey: ${BUNNY_STORAGE_PASSWORD}" \
            --data-binary "@${FILE}" "${BASE}/$(basename "$FILE")"
          curl -fsSL --retry 3 --retry-delay 5 -X PUT \
            -H "AccessKey: ${BUNNY_STORAGE_PASSWORD}" \
            --data-binary "@${FILE}.sha256" "${BASE}/$(basename "$FILE").sha256"

      - name: Install mc
        shell: bash
        run: |
          curl -fsSL -o /tmp/mc.exe https://dl.min.io/client/mc/release/windows-amd64/mc.exe
          /tmp/mc.exe --version | head -1

      - name: Upload to minio (backup mirror)
        shell: bash
        env:
          MINIO_ENDPOINT: ${{ secrets.MINIO_ENDPOINT }}
          MINIO_ACCESS_KEY: ${{ secrets.MINIO_ACCESS_KEY }}
          MINIO_SECRET_KEY: ${{ secrets.MINIO_SECRET_KEY }}
        run: |
          V="${{ steps.resolve.outputs.version }}"
          /tmp/mc.exe alias set s3target "https://${MINIO_ENDPOINT}" "$MINIO_ACCESS_KEY" "$MINIO_SECRET_KEY"
          /tmp/mc.exe cp "release/installer/LokLM-Setup-${V}-win-x64.exe" "s3target/loklm-installers/v${V}/"
          /tmp/mc.exe cp "release/installer/LokLM-Setup-${V}-win-x64.exe.sha256" "s3target/loklm-installers/v${V}/"
          /tmp/mc.exe ls "s3target/loklm-installers/v${V}/"

  build-linux:
    name: Build AppImage + upload to bunny + minio
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.resolve.outputs.version }}
      sha256: ${{ steps.hash.outputs.sha256 }}
      size: ${{ steps.hash.outputs.size }}
    steps:
      - uses: actions/checkout@v4

      - name: Resolve version (tag oder dispatch-input)
        id: resolve
        shell: bash
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            V="${{ github.event.inputs.version }}"
          else
            V="${GITHUB_REF#refs/tags/v}"
          fi
          if [ -z "$V" ]; then
            echo "could not resolve version"; exit 1
          fi
          echo "version=$V" >> "$GITHUB_OUTPUT"

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install deps
        run: pnpm install --frozen-lockfile

      - name: Build (electron-vite)
        run: pnpm build

      # v0.2.2+ : keine GGUFs gebundled — first-launch downloader holt sie.
      - name: Package (AppImage)
        run: pnpm package:linux

      - name: Compute sha256 + size
        id: hash
        shell: bash
        run: |
          V="${{ steps.resolve.outputs.version }}"
          APP="release/LokLM-${V}.AppImage"
          if [ ! -f "$APP" ]; then
            echo "expected artefact missing: $APP"; ls -la release/; exit 1
          fi
          SHA=$(sha256sum "$APP" | awk '{print $1}')
          SIZE=$(stat -c%s "$APP")
          echo "$SHA  $(basename "$APP")" > "${APP}.sha256"
          echo "sha256=$SHA" >> "$GITHUB_OUTPUT"
          echo "size=$SIZE" >> "$GITHUB_OUTPUT"
          echo "built $APP , size=$SIZE sha256=$SHA"

      - name: Upload to Bunny Storage (primary , served via CDN)
        env:
          BUNNY_STORAGE_ZONE: ${{ secrets.BUNNY_STORAGE_ZONE }}
          BUNNY_STORAGE_HOSTNAME: ${{ secrets.BUNNY_STORAGE_HOSTNAME }}
          BUNNY_STORAGE_PASSWORD: ${{ secrets.BUNNY_STORAGE_PASSWORD }}
        run: |
          V="${{ steps.resolve.outputs.version }}"
          FILE="release/LokLM-${V}.AppImage"
          BASE="https://${BUNNY_STORAGE_HOSTNAME}/${BUNNY_STORAGE_ZONE}/v${V}"
          curl -fsSL --retry 3 --retry-delay 5 -X PUT \
            -H "AccessKey: ${BUNNY_STORAGE_PASSWORD}" \
            --data-binary "@${FILE}" "${BASE}/$(basename "$FILE")"
          curl -fsSL --retry 3 --retry-delay 5 -X PUT \
            -H "AccessKey: ${BUNNY_STORAGE_PASSWORD}" \
            --data-binary "@${FILE}.sha256" "${BASE}/$(basename "$FILE").sha256"

      - name: Install mc
        run: |
          curl -fsSL -o /tmp/mc https://dl.min.io/client/mc/release/linux-amd64/mc
          chmod +x /tmp/mc
          /tmp/mc --version | head -1

      - name: Upload to minio (backup mirror)
        env:
          MINIO_ENDPOINT: ${{ secrets.MINIO_ENDPOINT }}
          MINIO_ACCESS_KEY: ${{ secrets.MINIO_ACCESS_KEY }}
          MINIO_SECRET_KEY: ${{ secrets.MINIO_SECRET_KEY }}
        run: |
          V="${{ steps.resolve.outputs.version }}"
          /tmp/mc alias set s3target "https://${MINIO_ENDPOINT}" "$MINIO_ACCESS_KEY" "$MINIO_SECRET_KEY"
          /tmp/mc cp "release/LokLM-${V}.AppImage" "s3target/loklm-installers/v${V}/"
          /tmp/mc cp "release/LokLM-${V}.AppImage.sha256" "s3target/loklm-installers/v${V}/"
          /tmp/mc ls "s3target/loklm-installers/v${V}/"

  bump-and-redeploy:
    name: Bump manifest + redeploy website
    needs: [build-windows, build-linux]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'
          cache-dependency-path: |
            pnpm-lock.yaml
            website/pnpm-lock.yaml

      - name: Patch releases.ts (windows)
        run: |
          node scripts/bump-release.mjs \
            "${{ needs.build-windows.outputs.version }}" \
            windows \
            "${{ needs.build-windows.outputs.sha256 }}" \
            "${{ needs.build-windows.outputs.size }}"

      - name: Patch releases.ts (linux)
        run: |
          node scripts/bump-release.mjs \
            "${{ needs.build-linux.outputs.version }}" \
            linux \
            "${{ needs.build-linux.outputs.sha256 }}" \
            "${{ needs.build-linux.outputs.size }}"

      - name: Install website deps
        working-directory: website
        run: pnpm install --ignore-workspace --frozen-lockfile

      - name: Build website
        working-directory: website
        env:
          PUBLIC_INSTALLER_BASE_URL: ${{ secrets.PUBLIC_INSTALLER_BASE_URL }}
        run: pnpm build

      - name: Set up SSH
        env:
          HETZNER_SSH_KEY: ${{ secrets.HETZNER_SSH_KEY }}
          HETZNER_HOST: ${{ secrets.HETZNER_HOST }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$HETZNER_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "$HETZNER_HOST" >> ~/.ssh/known_hosts

      - name: Rsync dist to Hetzner
        env:
          HETZNER_HOST: ${{ secrets.HETZNER_HOST }}
          HETZNER_USER: ${{ secrets.HETZNER_USER }}
          HETZNER_PATH: ${{ secrets.HETZNER_PATH }}
        run: |
          rsync -avz --delete \
            -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=yes" \
            website/dist/ \
            "${HETZNER_USER}@${HETZNER_HOST}:${HETZNER_PATH}/"

      - name: Commit manifest bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet website/src/data/releases.ts; then
            echo "manifest unverändert , skip commit"
            exit 0
          fi
          git add website/src/data/releases.ts
          git commit -m "release , v${{ needs.build-windows.outputs.version }} , windows + linux assets"
          git push origin main

      - name: Clean up SSH key
        if: always()
        run: rm -f ~/.ssh/deploy_key

      - name: Record backup URLs in run summary
        env:
          PUBLIC_INSTALLER_BASE_URL: ${{ secrets.PUBLIC_INSTALLER_BASE_URL }}
        run: |
          V="${{ needs.build-windows.outputs.version }}"
          {
            echo "## Release v${V} — mirrors"
            echo ""
            echo "**Primary (CDN):** \`${PUBLIC_INSTALLER_BASE_URL}/v${V}/\`"
            echo ""
            echo "**Backup (minio , manual fallback):**"
            echo "- Windows: https://s3.ltwodl.com/loklm-installers/v${V}/LokLM-Setup-${V}-win-x64.exe"
            echo "- Linux:   https://s3.ltwodl.com/loklm-installers/v${V}/LokLM-${V}.AppImage"
          } >> "$GITHUB_STEP_SUMMARY"
