name: Release installer

# baut den electron-installer für eine version , lädt ihn nach bunny storage
# (primary, fronted vom CDN) und minio (manual backup mirror) , patcht
# releases.ts + re-deployt die website mit aktualisiertem manifest.
# v0.2.2+ : windows ist nsis statt zip , GGUFs werden NICHT mehr gebundled
# (first-launch downloader holt sie in userData/models). slim installer
# ~375 MB statt ~6 GB.
# backup-URL-pattern bei CDN-ausfall:
#   https://s3.ltwodl.com/loklm-installers/v<V>/LokLM-Setup-<V>-win-x64.exe
#   https://s3.ltwodl.com/loklm-installers/v<V>/LokLM-<V>.AppImage
on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      version:
        description: 'Version ohne v-prefix , z.b. 0.1.0'
        required: true
        type: string

# nur eine release-pipeline pro version gleichzeitig.
concurrency:
  group: release-installer-${{ github.event.inputs.version || github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  build-windows:
    name: Build .exe + upload to bunny + minio
    runs-on: windows-latest
    outputs:
      version: ${{ steps.resolve.outputs.version }}
      sha256: ${{ steps.hash.outputs.sha256 }}
      size: ${{ steps.hash.outputs.size }}
    steps:
      - uses: actions/checkout@v4

      - name: Resolve version (tag oder dispatch-input)
        id: resolve
        shell: bash
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            V="${{ github.event.inputs.version }}"
          else
            V="${GITHUB_REF#refs/tags/v}"
          fi
          if [ -z "$V" ]; then
            echo "could not resolve version"; exit 1
          fi
          echo "version=$V" >> "$GITHUB_OUTPUT"
          PKG_V=$(node -p "require('./package.json').version")
          if [ "$V" != "$PKG_V" ]; then
            echo "::warning::workflow version $V != package.json $PKG_V , artefakt wird $V haben"
          fi

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install deps
        run: pnpm install --frozen-lockfile

      - name: Install Rust toolchain ( msvc )
        # Tauri wizard ( installer-wizard/src-tauri ) needs cargo to build
        # the native loklm-installer.exe. windows-latest already ships
        # Visual Studio 2022 with the C++ workload + Windows SDK , so the
        # MSVC linker resolves without extra installs.
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: x86_64-pc-windows-msvc

      - name: Cache cargo registry + tauri target
        # Caches ~/.cargo/registry + installer-wizard/src-tauri/target so
        # repeat CI runs skip the ~5 min first-time tauri compile and
        # finish the wizard build in ~30s.
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: installer-wizard/src-tauri
          cache-on-failure: true

      - name: Install tauri-cli
        # `cargo install` only recompiles if the version target differs from
        # the cached binary , so this is a no-op on warm cache runs.
        run: cargo install tauri-cli --version "^2.0" --locked

      - name: Build payload + wizard + bundle ( pnpm package:win )
        # Three-stage pipeline :
        #   package:win:payload  → release/win-unpacked/  (electron-vite + electron-builder)
        #   package:win:wizard   → installer-wizard/src-tauri/target/release/loklm-installer.exe
        #                          (cargo tauri build , Rust + WebView2 wizard)
        #   package:win:stub     → release/LokLM-Setup-<v>-win-x64.exe
        #                          (NSIS wraps wizard + payload into one .exe)
        # No GGUFs are bundled — the first-launch downloader in src/main/
        # services/models/ModelDownloader.ts fetches them to %APPDATA%\loklm
        # via SHA256-verified HTTP pulls. CI saves ~6 GB / run.
        run: pnpm package:win

      - name: Compute sha256 + size
        id: hash
        shell: bash
        run: |
          V="${{ steps.resolve.outputs.version }}"
          EXE="release/LokLM-Setup-${V}-win-x64.exe"

          # scripts/build-installer-stub.mjs writes exactly this filename ;
          # bail early if it's missing because something earlier broke.
          if [ ! -f "$EXE" ]; then
            echo "expected $EXE missing"
            ls -la release/ || true
            exit 1
          fi

          SHA=$(sha256sum "$EXE" | awk '{print $1}')
          SIZE=$(stat -c%s "$EXE")
          echo "$SHA  $(basename "$EXE")" > "${EXE}.sha256"
          echo "sha256=$SHA" >> "$GITHUB_OUTPUT"
          echo "size=$SIZE" >> "$GITHUB_OUTPUT"
          echo "built $EXE , size=$SIZE sha256=$SHA"

      - name: Upload to Bunny Storage (primary , served via CDN)
        shell: bash
        env:
          BUNNY_STORAGE_ZONE: ${{ secrets.BUNNY_STORAGE_ZONE }}
          BUNNY_STORAGE_HOSTNAME: ${{ secrets.BUNNY_STORAGE_HOSTNAME }}
          BUNNY_STORAGE_PASSWORD: ${{ secrets.BUNNY_STORAGE_PASSWORD }}
        run: |
          V="${{ steps.resolve.outputs.version }}"
          FILE="release/LokLM-Setup-${V}-win-x64.exe"
          BASE="https://${BUNNY_STORAGE_HOSTNAME}/${BUNNY_STORAGE_ZONE}/v${V}"
          curl -fsSL --retry 3 --retry-delay 5 -X PUT \
            -H "AccessKey: ${BUNNY_STORAGE_PASSWORD}" \
            --data-binary "@${FILE}" "${BASE}/$(basename "$FILE")"
          curl -fsSL --retry 3 --retry-delay 5 -X PUT \
            -H "AccessKey: ${BUNNY_STORAGE_PASSWORD}" \
            --data-binary "@${FILE}.sha256" "${BASE}/$(basename "$FILE").sha256"

      - name: Install mc
        shell: bash
        run: |
          curl -fsSL -o /tmp/mc.exe https://dl.min.io/client/mc/release/windows-amd64/mc.exe
          /tmp/mc.exe --version | head -1

      - name: Upload to minio (backup mirror)
        shell: bash
        env:
          MINIO_ENDPOINT: ${{ secrets.MINIO_ENDPOINT }}
          MINIO_ACCESS_KEY: ${{ secrets.MINIO_ACCESS_KEY }}
          MINIO_SECRET_KEY: ${{ secrets.MINIO_SECRET_KEY }}
        run: |
          V="${{ steps.resolve.outputs.version }}"
          /tmp/mc.exe alias set s3target "https://${MINIO_ENDPOINT}" "$MINIO_ACCESS_KEY" "$MINIO_SECRET_KEY"
          /tmp/mc.exe cp "release/LokLM-Setup-${V}-win-x64.exe" "s3target/loklm-installers/v${V}/"
          /tmp/mc.exe cp "release/LokLM-Setup-${V}-win-x64.exe.sha256" "s3target/loklm-installers/v${V}/"
          /tmp/mc.exe ls "s3target/loklm-installers/v${V}/"

  build-linux:
    name: Build .run installer + upload to bunny + minio
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.resolve.outputs.version }}
      sha256: ${{ steps.hash.outputs.sha256 }}
      size: ${{ steps.hash.outputs.size }}
    steps:
      - uses: actions/checkout@v4

      - name: Resolve version (tag oder dispatch-input)
        id: resolve
        shell: bash
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            V="${{ github.event.inputs.version }}"
          else
            V="${GITHUB_REF#refs/tags/v}"
          fi
          if [ -z "$V" ]; then
            echo "could not resolve version"; exit 1
          fi
          echo "version=$V" >> "$GITHUB_OUTPUT"

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install deps
        run: pnpm install --frozen-lockfile

      - name: Install Tauri's system deps + makeself
        # Tauri 2.x on Linux links against webkit2gtk-4.1 ( required ) and
        # libayatana-appindicator3-1 ( for tray icons , not used by the
        # wizard but Tauri's build script checks for it ). librsvg2-dev
        # is needed for SVG-based icon rendering at build time.
        # makeself is the self-extractor we wrap wizard + payload into.
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            makeself

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: x86_64-unknown-linux-gnu

      - name: Cache cargo registry + tauri target
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: installer-wizard/src-tauri
          cache-on-failure: true

      - name: Install tauri-cli
        run: cargo install tauri-cli --version "^2.0" --locked

      - name: Build payload + wizard + bundle ( pnpm package:linux )
        # Three-stage pipeline ( mirrors Windows ) :
        #   package:linux:payload  → release/linux-unpacked/  (electron-builder --linux dir)
        #   package:linux:wizard   → installer-wizard/src-tauri/target/release/loklm-installer
        #                            (cargo tauri build , Rust + webkit2gtk wizard)
        #   package:linux:stub     → release/LokLM-Setup-<v>-linux-x64.run
        #                            (makeself wraps wizard + payload into one .run)
        run: pnpm package:linux

      - name: Compute sha256 + size
        id: hash
        shell: bash
        run: |
          V="${{ steps.resolve.outputs.version }}"
          APP="release/LokLM-Setup-${V}-linux-x64.run"
          if [ ! -f "$APP" ]; then
            echo "expected artefact missing: $APP"; ls -la release/; exit 1
          fi
          SHA=$(sha256sum "$APP" | awk '{print $1}')
          SIZE=$(stat -c%s "$APP")
          echo "$SHA  $(basename "$APP")" > "${APP}.sha256"
          echo "sha256=$SHA" >> "$GITHUB_OUTPUT"
          echo "size=$SIZE" >> "$GITHUB_OUTPUT"
          echo "built $APP , size=$SIZE sha256=$SHA"

      - name: Upload to Bunny Storage (primary , served via CDN)
        env:
          BUNNY_STORAGE_ZONE: ${{ secrets.BUNNY_STORAGE_ZONE }}
          BUNNY_STORAGE_HOSTNAME: ${{ secrets.BUNNY_STORAGE_HOSTNAME }}
          BUNNY_STORAGE_PASSWORD: ${{ secrets.BUNNY_STORAGE_PASSWORD }}
        run: |
          V="${{ steps.resolve.outputs.version }}"
          FILE="release/LokLM-Setup-${V}-linux-x64.run"
          BASE="https://${BUNNY_STORAGE_HOSTNAME}/${BUNNY_STORAGE_ZONE}/v${V}"
          curl -fsSL --retry 3 --retry-delay 5 -X PUT \
            -H "AccessKey: ${BUNNY_STORAGE_PASSWORD}" \
            --data-binary "@${FILE}" "${BASE}/$(basename "$FILE")"
          curl -fsSL --retry 3 --retry-delay 5 -X PUT \
            -H "AccessKey: ${BUNNY_STORAGE_PASSWORD}" \
            --data-binary "@${FILE}.sha256" "${BASE}/$(basename "$FILE").sha256"

      - name: Install mc
        run: |
          curl -fsSL -o /tmp/mc https://dl.min.io/client/mc/release/linux-amd64/mc
          chmod +x /tmp/mc
          /tmp/mc --version | head -1

      - name: Upload to minio (backup mirror)
        env:
          MINIO_ENDPOINT: ${{ secrets.MINIO_ENDPOINT }}
          MINIO_ACCESS_KEY: ${{ secrets.MINIO_ACCESS_KEY }}
          MINIO_SECRET_KEY: ${{ secrets.MINIO_SECRET_KEY }}
        run: |
          V="${{ steps.resolve.outputs.version }}"
          /tmp/mc alias set s3target "https://${MINIO_ENDPOINT}" "$MINIO_ACCESS_KEY" "$MINIO_SECRET_KEY"
          /tmp/mc cp "release/LokLM-Setup-${V}-linux-x64.run" "s3target/loklm-installers/v${V}/"
          /tmp/mc cp "release/LokLM-Setup-${V}-linux-x64.run.sha256" "s3target/loklm-installers/v${V}/"
          /tmp/mc ls "s3target/loklm-installers/v${V}/"

  build-macos:
    name: Build .dmg + upload to bunny + minio
    runs-on: macos-latest
    outputs:
      version: ${{ steps.resolve.outputs.version }}
      sha256: ${{ steps.hash.outputs.sha256 }}
      size: ${{ steps.hash.outputs.size }}
    steps:
      - uses: actions/checkout@v4

      - name: Resolve version (tag oder dispatch-input)
        id: resolve
        shell: bash
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            V="${{ github.event.inputs.version }}"
          else
            V="${GITHUB_REF#refs/tags/v}"
          fi
          if [ -z "$V" ]; then
            echo "could not resolve version"; exit 1
          fi
          echo "version=$V" >> "$GITHUB_OUTPUT"

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install deps
        run: pnpm install --frozen-lockfile

      - name: Package ( DMG , unsigned , universal )
        # No wizard on Mac — we ship the standard .dmg + drag-to-Applications
        # idiom Mac users expect. `identity: null` in build.mac disables
        # the auto-detected codesigning ; users see Gatekeeper warning on
        # first launch ( right-click → Open → confirm ). Adding a real
        # cert + notarization later is a single env-var swap.
        # Universal arch builds both Intel and Apple Silicon variants and
        # lipo-merges them into one .dmg — ~2x build time but one download.
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
        run: pnpm package:mac

      - name: Compute sha256 + size
        id: hash
        shell: bash
        run: |
          V="${{ steps.resolve.outputs.version }}"
          DMG="release/LokLM-${V}-mac.dmg"
          if [ ! -f "$DMG" ]; then
            echo "expected artefact missing: $DMG"; ls -la release/; exit 1
          fi
          SHA=$(shasum -a 256 "$DMG" | awk '{print $1}')
          SIZE=$(stat -f%z "$DMG")
          echo "$SHA  $(basename "$DMG")" > "${DMG}.sha256"
          echo "sha256=$SHA" >> "$GITHUB_OUTPUT"
          echo "size=$SIZE" >> "$GITHUB_OUTPUT"
          echo "built $DMG , size=$SIZE sha256=$SHA"

      - name: Upload to Bunny Storage (primary , served via CDN)
        env:
          BUNNY_STORAGE_ZONE: ${{ secrets.BUNNY_STORAGE_ZONE }}
          BUNNY_STORAGE_HOSTNAME: ${{ secrets.BUNNY_STORAGE_HOSTNAME }}
          BUNNY_STORAGE_PASSWORD: ${{ secrets.BUNNY_STORAGE_PASSWORD }}
        run: |
          V="${{ steps.resolve.outputs.version }}"
          FILE="release/LokLM-${V}-mac.dmg"
          BASE="https://${BUNNY_STORAGE_HOSTNAME}/${BUNNY_STORAGE_ZONE}/v${V}"
          curl -fsSL --retry 3 --retry-delay 5 -X PUT \
            -H "AccessKey: ${BUNNY_STORAGE_PASSWORD}" \
            --data-binary "@${FILE}" "${BASE}/$(basename "$FILE")"
          curl -fsSL --retry 3 --retry-delay 5 -X PUT \
            -H "AccessKey: ${BUNNY_STORAGE_PASSWORD}" \
            --data-binary "@${FILE}.sha256" "${BASE}/$(basename "$FILE").sha256"

      - name: Install mc
        run: |
          curl -fsSL -o /tmp/mc https://dl.min.io/client/mc/release/darwin-amd64/mc
          chmod +x /tmp/mc
          /tmp/mc --version | head -1

      - name: Upload to minio (backup mirror)
        env:
          MINIO_ENDPOINT: ${{ secrets.MINIO_ENDPOINT }}
          MINIO_ACCESS_KEY: ${{ secrets.MINIO_ACCESS_KEY }}
          MINIO_SECRET_KEY: ${{ secrets.MINIO_SECRET_KEY }}
        run: |
          V="${{ steps.resolve.outputs.version }}"
          /tmp/mc alias set s3target "https://${MINIO_ENDPOINT}" "$MINIO_ACCESS_KEY" "$MINIO_SECRET_KEY"
          /tmp/mc cp "release/LokLM-${V}-mac.dmg" "s3target/loklm-installers/v${V}/"
          /tmp/mc cp "release/LokLM-${V}-mac.dmg.sha256" "s3target/loklm-installers/v${V}/"
          /tmp/mc ls "s3target/loklm-installers/v${V}/"

  bump-and-redeploy:
    name: Bump manifest + redeploy website
    needs: [build-windows, build-linux, build-macos]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'
          cache-dependency-path: |
            pnpm-lock.yaml
            website/pnpm-lock.yaml

      - name: Patch releases.ts (windows)
        run: |
          node scripts/bump-release.mjs \
            "${{ needs.build-windows.outputs.version }}" \
            windows \
            "${{ needs.build-windows.outputs.sha256 }}" \
            "${{ needs.build-windows.outputs.size }}"

      - name: Patch releases.ts (linux)
        run: |
          node scripts/bump-release.mjs \
            "${{ needs.build-linux.outputs.version }}" \
            linux \
            "${{ needs.build-linux.outputs.sha256 }}" \
            "${{ needs.build-linux.outputs.size }}"

      - name: Patch releases.ts (macos)
        run: |
          node scripts/bump-release.mjs \
            "${{ needs.build-macos.outputs.version }}" \
            macos \
            "${{ needs.build-macos.outputs.sha256 }}" \
            "${{ needs.build-macos.outputs.size }}"

      - name: Install website deps
        working-directory: website
        run: pnpm install --ignore-workspace --frozen-lockfile

      - name: Build website
        working-directory: website
        env:
          PUBLIC_INSTALLER_BASE_URL: ${{ secrets.PUBLIC_INSTALLER_BASE_URL }}
        run: pnpm build

      - name: Set up SSH
        env:
          HETZNER_SSH_KEY: ${{ secrets.HETZNER_SSH_KEY }}
          HETZNER_HOST: ${{ secrets.HETZNER_HOST }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$HETZNER_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "$HETZNER_HOST" >> ~/.ssh/known_hosts

      - name: Rsync dist to Hetzner
        env:
          HETZNER_HOST: ${{ secrets.HETZNER_HOST }}
          HETZNER_USER: ${{ secrets.HETZNER_USER }}
          HETZNER_PATH: ${{ secrets.HETZNER_PATH }}
        run: |
          rsync -avz --delete \
            -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=yes" \
            website/dist/ \
            "${HETZNER_USER}@${HETZNER_HOST}:${HETZNER_PATH}/"

      - name: Commit manifest bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet website/src/data/releases.ts; then
            echo "manifest unverändert , skip commit"
            exit 0
          fi
          git add website/src/data/releases.ts
          git commit -m "release , v${{ needs.build-windows.outputs.version }} , windows + linux assets"
          git push origin main

      - name: Clean up SSH key
        if: always()
        run: rm -f ~/.ssh/deploy_key

      - name: Record backup URLs in run summary
        env:
          PUBLIC_INSTALLER_BASE_URL: ${{ secrets.PUBLIC_INSTALLER_BASE_URL }}
        run: |
          V="${{ needs.build-windows.outputs.version }}"
          {
            echo "## Release v${V} — mirrors"
            echo ""
            echo "**Primary (CDN):** \`${PUBLIC_INSTALLER_BASE_URL}/v${V}/\`"
            echo ""
            echo "**Backup (minio , manual fallback):**"
            echo "- Windows: https://s3.ltwodl.com/loklm-installers/v${V}/LokLM-Setup-${V}-win-x64.exe"
            echo "- Linux:   https://s3.ltwodl.com/loklm-installers/v${V}/LokLM-Setup-${V}-linux-x64.run"
            echo "- macOS:   https://s3.ltwodl.com/loklm-installers/v${V}/LokLM-${V}-mac.dmg"
          } >> "$GITHUB_STEP_SUMMARY"
